<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>IP Hash Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 16px;
      width: 320px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #ff7a18;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    .result {
      margin-top: 15px;
      word-break: break-all;
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
    }
    .copy {
      margin-top: 10px;
      background: #00c6ff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔐 IP Hash Generator</h2>
    <input id="ip" placeholder="输入你的公网IP">
    <button onclick="generate()">生成 SHA-256</button>
    <div id="output" class="result"></div>
    <button class="copy" onclick="copy()">复制结果</button>
  </div>

  <script>
    async function generate() {
      const ip = document.getElementById("ip").value.trim();
      if (!ip) {
        alert("请输入 IP");
        return;
      }

      const data = new TextEncoder().encode(ip);
      const hash = await crypto.subtle.digest("SHA-256", data);
      const hex = Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");

      document.getElementById("output").textContent = hex;
    }

    function copy() {
      const text = document.getElementById("output").textContent;
      if (!text) return;
      navigator.clipboard.writeText(text);
      alert("已复制！");
    }
  </script>
</body>
</html>
